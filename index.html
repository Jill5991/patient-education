<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>用藥指導單張 Medication Instructions</title>
<style>
/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --font: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Noto Sans Thai",
          "Noto Sans", system-ui, sans-serif;
  --bg: #f0eeea;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.12);
  --text: #1a1a1a;
  --muted: #6b6b6b;
  --radius: 8px;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ===== Top Bar ===== */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: var(--surface); border-bottom: 0.5px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; justify-content: space-between;
  safe-area-inset-top: env(safe-area-inset-top);
}
.topbar-title { font-size: 15px; font-weight: 600; }
.topbar-sub { font-size: 11px; color: var(--muted); margin-left: 8px; font-weight: 400; }
.print-btn {
  background: none; border: 0.5px solid var(--border); border-radius: 6px;
  padding: 7px 14px; font-size: 13px; cursor: pointer; color: var(--text);
  display: flex; align-items: center; gap: 5px; font-family: var(--font);
}
.print-btn:active { background: #f0f0f0; }
.print-btn svg { flex-shrink: 0; }

/* ===== Language Bar ===== */
.lang-bar {
  background: var(--surface); border-bottom: 0.5px solid var(--border);
  padding: 8px 16px; display: flex; gap: 6px; overflow-x: auto;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.lang-bar::-webkit-scrollbar { display: none; }
.lang-btn {
  flex-shrink: 0; background: none;
  border: 0.5px solid var(--border); border-radius: 20px;
  padding: 6px 13px; font-size: 13px; cursor: pointer; color: var(--muted);
  white-space: nowrap; font-family: var(--font); transition: all 0.15s;
}
.lang-btn.active {
  background: var(--acc-light); border-color: var(--acc-main);
  color: var(--acc-dark); font-weight: 500;
}

/* ===== Category Index ===== */
.category-bar {
  background: var(--surface); border-bottom: 0.5px solid var(--border);
  padding: 8px 16px; display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.category-bar::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface); border: 0.5px solid var(--border); border-radius: 999px;
  padding: 6px 11px; font-size: 12px; cursor: pointer; color: var(--muted);
  white-space: nowrap; font-family: var(--font); transition: all 0.15s;
}
.cat-btn.active {
  border-color: var(--cat); box-shadow: inset 0 0 0 1px var(--cat);
  color: #1a1a1a; font-weight: 600;
}
.cat-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cat); flex-shrink: 0; }
.cat-count { font-size: 11px; color: #777; margin-left: 2px; }

/* ===== Finder Row ===== */
.finder-row {
  padding: 8px 16px 10px; display: flex; gap: 8px;
  background: var(--surface); border-bottom: 0.5px solid var(--border);
}
.med-search,
.med-select {
  border: 0.5px solid var(--border); border-radius: 8px;
  font-family: var(--font); font-size: 13px; color: var(--text);
  background: var(--surface); padding: 8px 10px;
}
.med-search { flex: 1; min-width: 0; }
.med-select { width: 42%; max-width: 290px; }
.med-search:focus,
.med-select:focus {
  outline: none; border-color: var(--acc-main);
  box-shadow: 0 0 0 2px rgba(0,0,0,0.04);
}

/* ===== Med Bar ===== */
.med-bar {
  padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.med-bar::-webkit-scrollbar { display: none; }
.med-btn {
  flex-shrink: 0; background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer;
  color: var(--muted); white-space: nowrap; font-family: var(--font);
  transition: all 0.15s;
}
.med-btn.active {
  border-color: var(--acc-main); color: var(--acc-dark);
  background: var(--acc-light); font-weight: 600;
}
.med-empty {
  font-size: 12px; color: var(--muted); padding: 8px 2px;
}

@media (max-width: 640px) {
  .finder-row { flex-direction: column; }
  .med-select { width: 100%; max-width: none; }
}

/* ===== Sheet Container ===== */
.sheet-wrap { padding: clamp(10px, 2.2vw, 20px); display: flex; justify-content: center; }

/* ===== Sheet (Müller-Brockmann Proportioned) ===== */
.sheet {
  width: min(96vw, 176mm);
  max-width: 176mm;
  min-width: 320px;
  background: white;
  border-radius: 1.2mm;
  box-shadow: 0 2px 20px rgba(0,0,0,0.12);
  overflow: hidden;
  font-family: var(--font);

  /* B5-based scale system (all values derived from 176mm width) */
  --mm: calc(min(96vw, 176mm) / 176);
  --base: clamp(14px, calc(5 * var(--mm)), 19px);   /* baseline grid */
  --mx: clamp(16px, calc(14 * var(--mm)), 53px);    /* left/right margin */
  --mt: clamp(20px, calc(18 * var(--mm)), 68px);    /* top margin zone */
  --mb: clamp(14px, calc(14 * var(--mm)), 53px);    /* bottom margin zone */
  --gutter: clamp(6px, calc(3 * var(--mm)), 12px);  /* 12-col gutter */
  --content-w: calc(100% - (2 * var(--mx)));
  --col: calc((var(--content-w) - (11 * var(--gutter))) / 12);
}

/* Color band top: 4mm */
.s-band { height: calc(4 * var(--mm)); }

/* Header: 12 columns full width, min 40mm */
.s-header {
  padding: var(--mt) var(--mx) calc(2 * var(--base));
  min-height: calc(40 * var(--mm));
}
.s-header-row {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, var(--col)));
  column-gap: var(--gutter);
  align-items: start;
}
.s-header-left { grid-column: 1 / span 9; min-width: 0; }
.s-name {
  font-size: clamp(18px, calc(7.8 * var(--mm)), 32px); /* ~22pt */
  font-weight: 700;
  line-height: calc(2 * var(--base));
  letter-spacing: 0.01em;
  word-break: break-word;
}
.s-sub {
  font-size: clamp(11px, calc(3.9 * var(--mm)), 16px); /* ~11pt */
  color: var(--muted);
  line-height: calc(0.95 * var(--base));
  letter-spacing: 0.008em;
  margin-top: calc(0.25 * var(--base));
}
.s-usage{
  font-size: clamp(11px, calc(3.6 * var(--mm)), 15px);
  color: var(--muted);
  line-height: var(--base);
  letter-spacing: 0.006em;
  margin-top: calc(0.15 * var(--base));
}
.s-badges {
  grid-column: 10 / span 3;
  justify-self: end;
  display: flex;
  flex-direction: column;
  gap: calc(0.6 * var(--base));
  align-items: flex-end;
}
.badge-type,
.badge-emrg {
  font-size: clamp(11px, calc(3.5 * var(--mm)), 15px);
  font-weight: 600;
  line-height: var(--base);
  letter-spacing: 0.01em;
  padding: calc(0.45 * var(--base)) calc(0.8 * var(--base));
  border-radius: calc(0.8 * var(--mm));
  white-space: nowrap;
}
.badge-emrg { font-weight: 700; background: #993C1D; color: white; }
.s-hr { border: none; border-top: 0.5px solid rgba(0,0,0,0.1); margin: 0 var(--mx); }

/* Steps: left 8 columns + right 4 columns */
.s-steps { padding: 0 var(--mx); }
.step {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, var(--col)));
  column-gap: var(--gutter);
  align-items: start;
  padding: var(--base) 0;
  border-bottom: 0.3px solid rgba(0,0,0,0.07);
}
.step:last-child { border-bottom: none; }
.step-left {
  grid-column: 1 / span 8;
  min-width: 0;
  display: flex;
  align-items: flex-start;
  gap: calc(2.2 * var(--mm));
}
.step-num {
  width: calc(8 * var(--mm));
  height: calc(8 * var(--mm));
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: calc(0.2 * var(--base));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(11px, calc(3.5 * var(--mm)), 15px);
  font-weight: 700;
  color: white;
}
.step-body { flex: 1; min-width: 0; }
.step-action {
  font-size: clamp(13px, calc(4 * var(--mm)), 18px);
  font-weight: 600;
  line-height: var(--base);
  letter-spacing: 0.006em;
  color: #1a1a1a;
  overflow-wrap: anywhere;
}
.step-note {
  font-size: clamp(12px, calc(3.6 * var(--mm)), 16px);
  color: #6b6b6b;
  margin-top: calc(0.15 * var(--base));
  line-height: var(--base);
  letter-spacing: 0.004em;
  overflow-wrap: anywhere;
}

/* Right 4-column illustration area */
.step-ill {
  grid-column: 9 / span 4;
  width: min(100%, calc((3 * var(--col)) + (2 * var(--gutter))));
  min-height: calc(16 * var(--mm));
  height: 100%;
  justify-self: end;
  border: 0.5px dashed rgba(0,0,0,0.14);
  border-radius: calc(1.5 * var(--mm));
  background: #fbfbfb;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.step-ill img,
.step-ill svg {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: right center;
  display: block;
}
.step-ill-label {
  font-size: clamp(10px, calc(3 * var(--mm)), 13px);
  line-height: var(--base);
  letter-spacing: 0.01em;
  color: #8a8a8a;
}

.step.hl { background: rgba(216,90,48,0.07); }
.step.hl .step-action { color: #4A1B0C; }
.step.hl .step-note   { color: #993C1D; font-weight: 500; }

/* Small phones can collapse illustration below text */
@media (max-width: 640px) {
  .step {
    grid-template-columns: minmax(0, 1fr);
    row-gap: calc(0.5 * var(--base));
  }
  .step-left,
  .step-ill {
    grid-column: 1 / -1;
  }
  .step-ill {
    width: 100%;
    justify-self: stretch;
  }
  .step-ill {
    min-height: calc(22 * var(--mm));
  }
}

/* Optional storage box */
.s-infobox {
  margin: calc(0.8 * var(--mm)) var(--mx) calc(1.4 * var(--mm));
  padding: calc(0.6 * var(--base)) calc(0.7 * var(--base));
  border-radius: calc(1.2 * var(--mm));
  border-left: calc(3 * var(--mm)) solid;
}
.s-infobox-title {
  font-size: clamp(12px, calc(3.5 * var(--mm)), 16px);
  font-weight: 600;
  line-height: var(--base);
  letter-spacing: 0.008em;
  margin-bottom: calc(0.1 * var(--base));
}
.s-infobox-text  {
  font-size: clamp(11px, calc(3.3 * var(--mm)), 15px);
  line-height: var(--base);
  letter-spacing: 0.003em;
  overflow-wrap: anywhere;
}

/* Warning bar: min 15mm high */
.s-warn {
  min-height: calc(15 * var(--mm));
  padding: calc(0.7 * var(--base)) var(--mx) calc(0.7 * var(--base)) calc(var(--mx) + 0.9 * var(--base));
  border-left: calc(3 * var(--mm)) solid;
}
.s-warn-item {
  font-size: clamp(11px, calc(3.35 * var(--mm)), 15px);
  font-weight: 500;
  line-height: var(--base);
  letter-spacing: 0.004em;
  margin-bottom: calc(0.15 * var(--base));
  padding-left: calc(0.55 * var(--base));
  position: relative;
  overflow-wrap: anywhere;
}
.s-warn-item::before { content: "●"; position: absolute; left: 0; }
.s-warn-item:last-child { margin-bottom: 0; }

/* Footer: left 9 columns + right 3 columns, min 25mm */
.s-footer {
  border-top: 0.5px solid rgba(0,0,0,0.1);
  min-height: calc(25 * var(--mm));
  padding: calc(0.75 * var(--base)) var(--mx) var(--mb);
  display: grid;
  grid-template-columns: repeat(12, minmax(0, var(--col)));
  column-gap: var(--gutter);
  align-items: end;
}
.s-footer-info {
  grid-column: 1 / span 9;
  font-size: clamp(11px, calc(3 * var(--mm)), 14px);
  color: #6f6f6f;
  line-height: var(--base);
  letter-spacing: 0.004em;
  overflow-wrap: anywhere;
}
.s-footer-qr {
  grid-column: 10 / span 3;
  text-align: center;
  justify-self: end;
  width: clamp(18mm, calc(22 * var(--mm)), 22mm);
}
#qr-target {
  width: clamp(18mm, calc(22 * var(--mm)), 22mm);
  height: clamp(18mm, calc(22 * var(--mm)), 22mm);
}
#qr-target canvas,
#qr-target img {
  width: 100% !important;
  height: 100% !important;
}
.s-footer-qr-label {
  font-size: clamp(10px, calc(2.8 * var(--mm)), 13px);
  color: #7f7f7f;
  margin-top: calc(0.2 * var(--base));
  line-height: var(--base);
  letter-spacing: 0.008em;
}

/* ===== Print ===== */
@media print {
  .topbar, .lang-bar, .category-bar, .finder-row, .med-bar { display: none !important; }
  body { background: white; }
  .sheet-wrap { padding: 0; }
  .sheet {
    max-width: 176mm; width: 176mm;
    box-shadow: none; border-radius: 0;
    page-break-after: always;
  }
}
</style>
</head>

// ============================================================
// STATE
// ============================================================
let lang   = "zh-TW";
let medIdx = 0;
let qrInstance = null;
let activeCategory = "all";
let medSearch = "";

function uiText(key) {
  return (UI[key] && (UI[key][lang] || UI[key]["en"])) || "";
}


function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function inferCategory(m) {
  if (m.category && CATEGORY_META[m.category]) return m.category;

  const badge = ((m.badge && (m.badge["zh-TW"] || m.badge["en"])) || "").toLowerCase();
  if (badge.includes("吸入") || badge.includes("inhaler")) return "inhaler";
  if (badge.includes("舌下") || badge.includes("sublingual")) return "ntg";
  if (badge.includes("外用") || badge.includes("topical") || badge.includes("貼片") || badge.includes("patch")) return "topical";
  if (badge.includes("眼") || badge.includes("耳") || badge.includes("鼻") || badge.includes("eye/ear/nasal")) return "eye";
  if (badge.includes("栓") || badge.includes("陰道") || badge.includes("supp") || badge.includes("vaginal")) return "supp";
  if (badge.includes("注射") || badge.includes("injection")) return "inject";
  if (badge.includes("戒菸") || badge.includes("smoking")) return "smoking";
  if (badge.includes("粉") || badge.includes("powder") || badge.includes("reconstitution")) return "powder";
  if (badge.includes("口服") || badge.includes("oral")) return "oral";

  const main = ((m.color && m.color.main) || "").toLowerCase();
  if (main === "#993c1d") return "ntg";
  if (main === "#185fa5") return "eye";
  if (main === "#534ab7") return "supp";
  if (main === "#854f0b") return "inject";
  if (main === "#27500a") return "smoking";
  if (main === "#0f6e56") return "inhaler";
  if (main === "#3b6d11") return "topical";
  return "other";
}

function getFilteredMedList() {
  const q = medSearch.trim().toLowerCase();
  return MEDICATIONS.map((med, index) => ({ med, index })).filter(({ med }) => {
    const matchCategory = activeCategory === "all" || med.category === activeCategory;
    if (!matchCategory) return false;

    if (!q) return true;
    const namePool = [
      med.name && med.name[lang],
      med.name && med.name["zh-TW"],
      med.name && med.name["en"],
      med.name && med.name["id"],
      med.name && med.name["vi"],
      med.name && med.name["th"],
      med.name && med.name["tl"],
      med.name && med.name["ja"]
    ].filter(Boolean).join(" ").toLowerCase();

    return namePool.includes(q);
  });
}

function ensureMedVisible() {
  const list = getFilteredMedList();
  if (!list.length) return;
  if (!list.some(item => item.index === medIdx)) medIdx = list[0].index;
  setAccent(MEDICATIONS[medIdx].color);
}

// ============================================================
// INIT
// ============================================================
function init() {
  MEDICATIONS.forEach(m => { m.category = inferCategory(m); });
  bindFinderEvents();
  renderLangBar();
  ensureMedVisible();
  renderCategoryBar();
  renderMedBar();
  render();
}

function bindFinderEvents() {
  const search = document.getElementById("medSearch");
  const select = document.getElementById("medSelect");

  if (search) {
    search.addEventListener("input", (e) => {
      medSearch = (e.target.value || "").trim().toLowerCase();
      ensureMedVisible();
      renderCategoryBar();
      renderMedBar();
      render();
    });
  }

  if (select) {
    select.addEventListener("change", (e) => {
      setMed(Number(e.target.value));
    });
  }
}

// ============================================================
// LANG BAR
// ============================================================
function renderLangBar() {
  const bar = document.getElementById("langBar");
  bar.innerHTML = LANGS.map(l =>
    `<button class="lang-btn${l.code===lang?" active":""}" onclick="setLang('${l.code}')">${l.flag} ${l.label}</button>`
  ).join("");
}

function setLang(code) {
  lang = code;
  document.documentElement.lang = code;
  renderLangBar();
  renderCategoryBar();
  renderMedBar();
  render();
}

// ============================================================
// CATEGORY BAR
// ============================================================
function renderCategoryBar() {
  const bar = document.getElementById("categoryBar");
  if (!bar) return;

  const counts = {};
  MEDICATIONS.forEach(m => { counts[m.category] = (counts[m.category] || 0) + 1; });

  const keys = CATEGORY_ORDER.filter(k => k === "all" || counts[k]);
  bar.innerHTML = keys.map(key => {
    const meta = CATEGORY_META[key] || CATEGORY_META.other;
    const label = (meta.label[lang] || meta.label["en"] || key);
    const count = key === "all" ? MEDICATIONS.length : counts[key];
    return `<button class="cat-btn${key===activeCategory?" active":""}" style="--cat:${meta.color}" onclick="setCategory('${key}')"><span class="cat-dot"></span><span>${label}</span><span class="cat-count">${count}</span></button>`;
  }).join("");
}

function setCategory(key) {
  activeCategory = key;
  ensureMedVisible();
  renderCategoryBar();
  renderMedBar();
  render();
}

// ============================================================
// MED BAR
// ============================================================
function renderMedBar() {
  const bar = document.getElementById("medBar");
  const search = document.getElementById("medSearch");
  const select = document.getElementById("medSelect");
  const list = getFilteredMedList();

  if (search) {
    search.placeholder = uiText("searchMed");
    if (search.value !== medSearch) search.value = medSearch;
  }

  if (!list.length) {
    if (bar) bar.innerHTML = `<div class="med-empty">${uiText("noResult")}</div>`;
    if (select) {
      select.disabled = true;
      select.innerHTML = `<option value="">${uiText("noResult")}</option>`;
    }
    return;
  }

  if (select) {
    select.disabled = false;
    select.innerHTML = list.map(({ med, index }) =>
      `<option value="${index}"${index===medIdx?" selected":""}>${med.name[lang] || med.name["en"]}</option>`
    ).join("");
  }

  if (bar) {
    bar.innerHTML = list.map(({ med, index }) =>
      `<button class="med-btn${index===medIdx?" active":""}" onclick="setMed(${index})">${med.name[lang] || med.name["en"]}</button>`
    ).join("");
  }

  setAccent(MEDICATIONS[medIdx].color);
}

function setMed(i) {
  if (Number.isNaN(i) || !MEDICATIONS[i]) return;
  medIdx = i;
  setAccent(MEDICATIONS[i].color);
  renderMedBar();
  render();
}

function setAccent(c) {
  document.documentElement.style.setProperty("--acc-main",  c.main);
  document.documentElement.style.setProperty("--acc-light", c.light);
  document.documentElement.style.setProperty("--acc-dark",  c.dark);
}

// ============================================================
// RENDER SHEET
// ============================================================
function render() {
  const m  = MEDICATIONS[medIdx];
  const c  = m.color;
  const t  = k => (m[k] && (m[k][lang] || m[k]["en"])) || "";
  const ui = k => UI[k][lang] || UI[k]["en"];

  // Steps HTML (left 8-column text + right 4-column illustration)
  const stepsHtml = m.steps.map((s, i) => {
    const isHL = s.highlight ? " hl" : "";

    let illSrc = "";
    let illAlt = uiText("illustration");
    if (typeof s.illustration === "string") {
      illSrc = s.illustration;
    } else if (s.illustration && typeof s.illustration === "object") {
      illSrc = s.illustration.src || "";
      if (s.illustration.alt) illAlt = s.illustration.alt[lang] || s.illustration.alt["en"] || illAlt;
    }

    const illHtml = illSrc
      ? `<img src="${escapeHtml(illSrc)}" alt="${escapeHtml(illAlt)}" loading="lazy" decoding="async">`
      : `<span class="step-ill-label">${uiText("illustration")}</span>`;

    return `<div class="step${isHL}">
      <div class="step-left">
        <div class="step-num" style="background:${c.main}">${i+1}</div>
        <div class="step-body">
          <div class="step-action">${s.action[lang] || s.action["en"]}</div>
          ${s.note ? `<div class="step-note">${s.note[lang] || s.note["en"]}</div>` : ""}
        </div>
      </div>
      <div class="step-ill">${illHtml}</div>
    </div>`;
  }).join("");

  // Storage box (NTG only)
  const storageHtml = m.storage ? `
    <div class="s-infobox" style="background:${c.light};border-color:${c.main}">
      <div class="s-infobox-title" style="color:${c.dark}">${m.storage.title[lang] || m.storage.title["en"]}</div>
      <div class="s-infobox-text"  style="color:${c.dark}">${m.storage.text[lang]  || m.storage.text["en"]}</div>
    </div>` : "";

  // Warnings HTML
  const warnHtml = (m.warnings || []).slice(0, 2).map(w =>
    `<div class="s-warn-item">${w[lang] || w["en"]}</div>`
  ).join("");

  // Emergency badge
  const emergBadge = m.emergency
    ? `<div class="badge-emrg">${ui("emergency")}</div>` : "";

  const today = new Date().toLocaleDateString("zh-TW", {year:"numeric",month:"2-digit",day:"2-digit"});

  document.getElementById("sheet").innerHTML = `
    <div class="s-band" style="background:${c.main}"></div>
    <div class="s-header" style="background:${c.light}">
      <div class="s-header-row">
        <div class="s-header-left">
          <div class="s-name" style="color:${c.dark}">${t("name")}</div>
          <div class="s-sub">${t("subtitle")}</div>
        </div>
        <div class="s-badges">
          ${emergBadge}
          <div class="badge-type" style="background:${c.badge};color:${c.badgeText}">${t("badge")}</div>
        </div>
      </div>
    </div>
    <hr class="s-hr">
    <div class="s-steps">${stepsHtml}</div>
    ${storageHtml}
    <div class="s-warn" style="background:#FAEEDA;border-color:#BA7517">
      ${warnHtml}
    </div>
    <div class="s-footer">
      <div class="s-footer-info">
        <div style="font-weight:500;font-size:9px;color:#555">${ui("pharmacy")}</div>
        <div>○○ ${ui("pharmacy")} &nbsp; Tel: 02-XXXX-XXXX</div>
        <div>${ui("prepared")}: ${today}</div>
      </div>
      <div class="s-footer-qr">
        <div id="qr-target"></div>
        <div class="s-footer-qr-label">${ui("scan")}</div>
      </div>
    </div>`;

  generateQR(m.qrUrl + "?lang=" + lang);
  document.getElementById("ui-print").textContent = ui("print");
}

// ============================================================
// QR CODE
// ============================================================
function getQrRenderSizePx() {
  const sheet = document.getElementById("sheet");
  if (!sheet) return 84;
  const mmPx = sheet.clientWidth / 176;
  return Math.max(68, Math.round(22 * mmPx));
}

function generateQR(url) {
  const el = document.getElementById("qr-target");
  if (!el) return;
  el.innerHTML = "";
  const qrSize = getQrRenderSizePx();
  try {
    new QRCode(el, {
      text: url,
      width: qrSize, height: qrSize,
      colorDark: "#1A1A1A",
      colorLight: "#FFFFFF",
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    el.innerHTML = `<div style="width:${qrSize}px;height:${qrSize}px;border:0.5px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:8px;color:#aaa">QR</div>`;
  }
}
